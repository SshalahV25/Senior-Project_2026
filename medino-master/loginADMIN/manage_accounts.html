<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Accounts</title>
<link rel="stylesheet" href="./css/style.css">

<style>

/* ===== TOP CONTROL ===== */
.top-controls{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
    flex-wrap:wrap;
    gap:10px;
}

.top-controls select{
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
}

.top-controls button{
    padding:10px 15px;
    border:none;
    background:#3498db;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
}

/* ===== FORM ===== */
.form-box{
    display:none;
    flex-wrap:wrap;
    gap:10px;
    background:#fff;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

.form-box.active{
    display:flex;
}

.form-box input{
    flex:1;
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
}

/* ===== TABLE ===== */
.table-box{
    background:#fff;
    padding:15px;
    border-radius:10px;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th, table td{
    padding:10px;
    text-align:center;
}

table th{
    background:#f9f9f9;
}

button.edit{background:#3498db;color:#fff;}
button.delete{background:#e74c3c;color:#fff;}
button.reset{background:#f39c12;color:#fff;}

button{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

/* 🔥 Overlay */
#resetBox{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

/* 🔥 Modal Card */
#resetBox .reset-card{
    background: #fff;
    padding: 25px;
    width: 320px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    animation: fadeIn 0.3s ease;
}

/* 🔥 Title */
.reset-card h3{
    margin-bottom: 15px;
    font-weight: 600;
}

/* 🔥 Inputs */
.reset-card input{
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    outline: none;
    transition: 0.3s;
    font-size: 14px;
}

/* Focus Effect */
.reset-card input:focus{
    border-color: #3498db;
    box-shadow: 0 0 0 3px rgba(52,152,219,0.15);
}

/* 🔥 Buttons container */
.reset-actions{
    display: flex;
    gap: 10px;
}

/* Save Button */
.reset-actions .save-btn{
    flex: 1;
    background: linear-gradient(135deg,#3498db,#2980b9);
    color: #fff;
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

/* Hover */
.save-btn:hover{
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(52,152,219,0.4);
}

/* Cancel Button */
.reset-actions .cancel-btn{
    flex: 1;
    background: #eee;
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

.cancel-btn:hover{
    background: #ddd;
}

/* 🔥 Animation */
@keyframes fadeIn{
    from{
        opacity: 0;
        transform: scale(0.9);
    }
    to{
        opacity: 1;
        transform: scale(1);
    }
}

#confirmEditBox{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.confirm-card{
    background: #fff;
    padding: 25px;
    width: 420px;
    border-radius: 18px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    animation: fadeIn 0.3s ease;
}

.confirm-card h3{
    margin-bottom: 15px;
    text-align: center;
}

/* مقارنة */
.compare-box{
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
}

.before, .after{
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    font-size: 14px;
}

/* Old */
.before{
    background: #ffecec;
    border: 1px solid #ffb3b3;
}

/* New */
.after{
    background: #eaffea;
    border: 1px solid #9be29b;
}

.before h4, .after h4{
    margin-bottom: 8px;
    font-size: 13px;
}

/* Buttons */
.confirm-actions{
    display: flex;
    gap: 10px;
}

.btn-confirm{
    flex: 1;
    background: linear-gradient(135deg,#2ecc71,#27ae60);
    color: #fff;
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

.btn-confirm:hover{
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(46,204,113,0.4);
}

.btn-cancel{
    flex: 1;
    background: #eee;
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

.btn-cancel:hover{
    background: #ddd;
}
#deleteBox{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(5px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.delete-card{
    background: #fff;
    padding: 25px;
    border-radius: 16px;
    width: 320px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

.delete-card h3{
    margin-bottom: 10px;
}

.delete-card p{
    color: #555;
    margin-bottom: 20px;
}

/* buttons */
.delete-actions{
    display: flex;
    gap: 10px;
}

.btn-delete{
    flex: 1;
    background: linear-gradient(135deg,#e74c3c,#c0392b);
    color: #fff;
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

.btn-delete:hover{
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(231,76,60,0.4);
}

.btn-cancel{
    flex: 1;
    background: #eee;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

.btn-cancel:hover{
    background: #ddd;
}

.compare-box {
    display: flex;
    gap: 20px;
    margin-top: 15px;
}

.before, .after {
    flex: 1;
    padding: 15px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
}

.before {
    background: rgba(255, 0, 0, 0.08);
    border: 1px solid rgba(255, 0, 0, 0.2);
}

.after {
    background: rgba(0, 200, 0, 0.08);
    border: 1px solid rgba(0, 200, 0, 0.2);
}

.compare-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px dashed #ddd;
}

.compare-row span {
    font-weight: 600;
    color: #555;
}

.compare-box {
    display: flex;
    gap: 15px;
    margin-top: 15px;
    flex-wrap: wrap; /* 🔥 مهم للريسبونسف */
}

.before, .after {
    flex: 1;
    min-width: 250px;
    padding: 15px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    overflow: hidden; /* 🔥 يمنع الخروج */
}

.before {
    background: rgba(255, 0, 0, 0.08);
    border: 1px solid rgba(255, 0, 0, 0.3);
}

.after {
    background: rgba(0, 200, 0, 0.08);
    border: 1px solid rgba(0, 200, 0, 0.3);
}

.compare-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px dashed #ddd;
    align-items: center;
}

.compare-row span {
    font-weight: 600;
    color: #555;
    white-space: nowrap;
}

/* 🔥 النص الطويل */
.compare-row p {
    margin: 0;
    text-align: right;
    word-break: break-word; /* 🔥 مهم */
    max-width: 60%;
}

.changed {
    color: #2ecc71;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>Admin</h2>
    <ul>
        <li onclick="go('dashboard.html')">🏠 Dashboard</li>
        <li onclick="go('specialty.html')">🧾 Specialty</li>
        <li onclick="go('doctors.html')">👨‍⚕️ Doctors</li>
        <li onclick="go('patients.html')">🧑 Patients</li>
        <li onclick="go('booking.html')">📅 Booking</li>
        <li class="active">⚙️ Accounts</li>
        <li onclick="go('reports.html')">📊 Reports</li>
    </ul>
</div>

<!-- MAIN -->
<div class="main">

<div class="navbar">
    <h3>Manage Accounts</h3>
    <button>Logout</button>
</div>

<div class="content">

<!-- 🔥 TOP CONTROL -->
<div class="top-controls">

    <select id="accountType" onchange="loadData()">
        <option value="patients">Patients</option>
        <option value="doctors">Doctors</option>
    </select>

    <input type="text" id="search" placeholder="Search..." onkeyup="searchData()">

    <button onclick="toggleForm()">+ Add Account</button>

</div>

<!-- 🔥 FORM -->
<!-- 🔥 FORM -->
<div class="form-box" id="formBox">

    <input type="hidden" id="id">

    <input type="text" id="name" placeholder="Name">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="phone" placeholder="Phone">
    <select id="gender">

        <option value="">
            Select Gender
        </option>

        <option value="Male">
            Male
        </option>

        <option value="Female">
            Female
        </option>

    </select>
    <!-- 🔥 Birth Date -->
    <input type="date" id="birthdate">

    <!-- 🔥 PASSWORD (ADD ONLY) -->
    <input type="password" id="password" placeholder="Password">
    <input type="password" id="confirmPassword" placeholder="Confirm Password">

    <button id="saveBtn" onclick="saveData()">Save</button>

</div>

<!-- 🔥 RESET PASSWORD MODAL -->
<div id="resetBox">

    <div class="reset-card">

        <h3>Reset Password</h3>

        <input type="password" id="newPass" placeholder="New Password">
        <input type="password" id="confirmNewPass" placeholder="Confirm Password">

        <div class="reset-actions">
            <button class="save-btn" onclick="saveNewPassword()">Save</button>
            <button class="cancel-btn" onclick="closeReset()">Cancel</button>
        </div>

    </div>

</div>

<!-- 🔥 TABLE -->
<div class="table-box">

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Age</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="tableBody"></tbody>

    </table>

</div>

</div>
</div>
</div>

<div id="confirmEditBox">

    <div class="confirm-card">

        <h3>Confirm Changes</h3>

        <div class="compare-box">

            <div class="before">
                <h4>Before</h4>
                <p id="oldData"></p>
            </div>

            <div class="after">
                <h4>After</h4>
                <p id="newData"></p>
            </div>

        </div>

        <div class="confirm-actions">
            <button class="btn-confirm" onclick="applyEdit()">Confirm</button>
            <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
        </div>

    </div>
</div>

    <div id="deleteBox">

            <div class="delete-card">

            <h3>Delete Account</h3>

            <p>Are you sure you want to delete this account?</p>

            <div class="delete-actions">
                <button class="btn-delete" onclick="confirmDelete()">Delete</button>
                <button class="btn-cancel" onclick="closeDelete()">Cancel</button>
            </div>

        </div>

        </div>
<script>
/* ===== DATA ===== */
/* ===== GLOBAL ===== */
let currentResetId = null;
let deleteId = null;


/* ===== AGE ===== */
function calcAge(date){

    if(!date) return "-";

    let birth = new Date(date);

    let diff =
        Date.now() - birth.getTime();

    let age =
        new Date(diff);

    return Math.abs(
        age.getUTCFullYear() - 1970
    );
}


/* ===== LOAD DATA ===== */
function loadData(){

    let type =
        document.getElementById("accountType").value;

    fetch(
        `php/get_accounts.php?type=${type}`
    )

    .then(res => res.json())

    .then(data => {

        let table =
            document.getElementById("tableBody");

        table.innerHTML = "";

        // 🔥 لو Doctors
        if(type === "doctors"){

            // اخفاء الفورم
            document.getElementById(
                "formBox"
            ).classList.remove("active");

            // تغيير الزر
            document.querySelector(
                ".top-controls button"
            ).innerText = "+ Add Doctor";

        }else{

            document.querySelector(
                ".top-controls button"
            ).innerText = "+ Add Patient";
        }

        data.forEach(item => {

            table.innerHTML += `

            <tr>

                <td>${item.name}</td>

                <td>${item.email}</td>

                <td>${item.phone ?? "-"}</td>

                <td>
                    ${
                        item.birthdate
                        ?
                        calcAge(item.birthdate)
                        :
                        "-"
                    }
                </td>

                <td>

                    ${
                        type === "patients"
                        ?
                        `
                        <button
                            class="delete"
                            onclick="deleteData(${item.id})"
                        >
                            Delete
                        </button>
                        `
                        :
                        ""
                    }

                    <button
                        class="reset"
                        onclick="openReset(${item.id})"
                    >
                        Reset
                    </button>

                </td>

            </tr>
            `;
        });

    })

    .catch(err => {

        console.log(err);

        alert("Load failed ❌");
    });
}


/* ===== SEARCH ===== */
function searchData(){

    let val =
        document.getElementById(
            "search"
        ).value.toLowerCase();

    document
    .querySelectorAll("#tableBody tr")

    .forEach(r => {

        r.style.display =
            r.innerText
            .toLowerCase()
            .includes(val)

            ? ""

            : "none";
    });
}


/* ===== TOGGLE FORM ===== */
function toggleForm(){

    let type =
        document.getElementById(
            "accountType"
        ).value;

    // 🔥 لو Doctors
    if(type === "doctors"){

        window.location.href =
            "doctors.html";

        return;
    }

    let form =
        document.getElementById(
            "formBox"
        );

    if(!form.classList.contains("active")){

        clearForm();
    }

    form.classList.toggle("active");
}


/* ===== SAVE PATIENT ===== */
function saveData(){

    let type =
        document.getElementById(
            "accountType"
        ).value;

    // 🔥 المرضى فقط
    if(type !== "patients"){

        alert(
            "Doctors are added from doctors page"
        );

        return;
    }

    let password =
        document.getElementById(
            "password"
        ).value;

    let confirm =
        document.getElementById(
            "confirmPassword"
        ).value;

    if(password !== confirm){

        alert(
            "Password mismatch ❌"
        );

        return;
    }

    let data = {

        name:
            document.getElementById(
                "name"
            ).value,

        email:
            document.getElementById(
                "email"
            ).value,

        phone:
            document.getElementById(
                "phone"
            ).value,

        birthdate:
            document.getElementById(
                "birthdate"
            ).value,

            gender:
            document.getElementById(
                "gender"
            ).value,

        password:
            password
    };

    fetch(
        "../patient_page/register.php",
        {
            method: "POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body: JSON.stringify(data)
        }
    )

    .then(res => res.json())

    .then(res => {

        if(res.status === "success"){

            alert(
                "Patient added ✅"
            );

            clearForm();

            loadData();

            document
            .getElementById("formBox")
            .classList.remove("active");

        }else{

            alert(
                res.message
            );
        }

    })

    .catch(err => {

        console.log(err);

        alert(
            "Add failed ❌"
        );
    });
}


/* ===== DELETE ===== */
function deleteData(id){

    deleteId = id;

    document.getElementById(
        "deleteBox"
    ).style.display = "flex";
}


function confirmDelete(){

    if(deleteId === null){

        alert(
            "No account selected ❌"
        );

        return;
    }

    fetch(
        `php/delete_account.php?id=${deleteId}&type=patients`
    )

    .then(res => res.text())

    .then(msg => {

        if(msg === "success"){

            alert(
                "Deleted successfully ✅"
            );

            loadData();

        }else{

            alert(
                "Delete failed ❌"
            );
        }

        closeDelete();

    })

    .catch(err => {

        console.log(err);

        alert(
            "Delete failed ❌"
        );
    });
}


/* ===== RESET PASSWORD ===== */
function openReset(id){

    currentResetId = id;

    document.getElementById(
        "resetBox"
    ).style.display = "flex";
}


function saveNewPassword(){

    let password =
        document.getElementById(
            "newPass"
        ).value;

    let confirm =
        document.getElementById(
            "confirmNewPass"
        ).value;

    if(password !== confirm){

        alert(
            "Password mismatch ❌"
        );

        return;
    }

    let type =
        document.getElementById(
            "accountType"
        ).value;

    fetch(
        "php/reset_account_password.php",
        {
            method:"POST",

            headers:{
                "Content-Type":
                "application/json"
            },

            body: JSON.stringify({

                id:
                    currentResetId,

                type:
                    type,

                password:
                    password
            })
        }
    )

    .then(res => res.json())

    .then(data => {

        if(data.status === "success"){

            alert(
                "Password updated ✅"
            );

            closeReset();

        }else{

            alert(
                "Reset failed ❌"
            );
        }

    })

    .catch(err => {

        console.log(err);

        alert(
            "Reset failed ❌"
        );
    });
}


function closeReset(){

    document.getElementById(
        "resetBox"
    ).style.display = "none";

    document.getElementById(
        "newPass"
    ).value = "";

    document.getElementById(
        "confirmNewPass"
    ).value = "";
}


/* ===== CLEAR ===== */
function clearForm(){

    document.getElementById(
        "id"
    ).value = "";

    document.getElementById(
        "name"
    ).value = "";

    document.getElementById(
        "email"
    ).value = "";

    document.getElementById(
        "phone"
    ).value = "";

    document.getElementById(
        "birthdate"
    ).value = "";

    document.getElementById(
        "gender"
    ).value = "";

    document.getElementById(
        "password"
    ).value = "";

    document.getElementById(
        "confirmPassword"
    ).value = "";
}


/* ===== CLOSE DELETE ===== */
function closeDelete(){

    document.getElementById(
        "deleteBox"
    ).style.display = "none";
}


/* ===== GO ===== */
function go(page){

    window.location.href = page;
}


/* ===== INIT ===== */
loadData();
</script>

</body>
</html>
