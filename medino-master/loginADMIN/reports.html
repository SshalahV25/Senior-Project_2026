<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Smart Medical Reports
    </title>

    <link
        rel="stylesheet"
        href="./css/style.css"
    >

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <!-- LOADER -->

<div
    class="page-loader"
    id="pageLoader"
>

    <div class="loader"></div>

</div>

<div class="dashboard">

    <!-- =========================
         SIDEBAR
    ========================= -->

    <div class="sidebar">

        <h2>Admin</h2>

        <ul>

            <li onclick="go('dashboard.html')">
                🏠 Dashboard
            </li>

            <li onclick="go('specialty.html')">
                🧾 Specialty
            </li>

            <li onclick="go('doctors.html')">
                👨‍⚕️ Doctors
            </li>

            <li onclick="go('patients.html')">
                🧑 Patients
            </li>

            <li onclick="go('booking.html')">
                📅 Booking
            </li>

            <li onclick="go('manage_accounts.html')">
                ⚙️ Accounts
            </li>

            <li class="active">
                📊 Reports
            </li>

        </ul>

    </div>

    <!-- =========================
         MAIN
    ========================= -->

    <div class="main">

        <!-- NAVBAR -->

        <div class="navbar">

            <h3>
                Smart Medical Analytics
            </h3>

            <button onclick="logout()">
                Logout
            </button>

        </div>

        <!-- =========================
             CONTENT
        ========================= -->

        <div class="content">

            <!-- =========================
                 REPORT CARDS
            ========================= -->

            <div class="cards">

                <div
                    class="report-card blue"
                    onclick="openReport('bookings')"
                >

                    <h1 id="totalBookings">
                        0
                    </h1>

                    <p>
                        Total Bookings
                    </p>

                </div>

                <div
                    class="report-card green"
                    onclick="openReport('completed')"
                >

                    <h1 id="completedBookings">
                        0
                    </h1>

                    <p>
                        Completed Bookings
                    </p>

                </div>

                <div
                    class="report-card orange"
                    onclick="openReport('confirmed')"
                >

                    <h1 id="confirmedBookings">
                        0
                    </h1>

                    <p>
                        Confirmed Bookings
                    </p>

                </div>

                <div
                    class="report-card red"
                    onclick="openReport('cancelled')"
                >

                    <h1 id="cancelledBookings">
                        0
                    </h1>

                    <p>
                        Cancelled Bookings
                    </p>

                </div>

                <div
                    class="report-card purple"
                    onclick="openReport('patients')"
                >

                    <h1 id="totalPatients">
                        0
                    </h1>

                    <p>
                        Total Patients
                    </p>

                </div>

                <div
                    class="report-card dark"
                    onclick="openReport('doctors')"
                >

                    <h1 id="totalDoctors">
                        0
                    </h1>

                    <p>
                        Total Doctors
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- =========================
     REPORT POPUP
========================= -->

<div
    class="popup-overlay"
    id="popupOverlay"
>

    <div class="popup-box">

        <div class="popup-header">

            <h2 id="popupTitle">
                Analytics
            </h2>

            <button
                class="close-btn"
                onclick="closePopup()"
            >
                ✖
            </button>

        </div>

        <div
            class="popup-body"
            id="popupBody"
        >

        </div>

        <div class="popup-footer">

            <button
                class="download-btn"
                onclick="downloadPDF()"
            >
                ⬇ Download Report
            </button>

        </div>

    </div>

</div>

<!-- =========================
     STYLE
========================= -->

<style>

/* =========================
   CARDS
========================= */

.cards{

    display: grid;

    grid-template-columns:
        repeat(auto-fit,minmax(250px,1fr));

    gap: 20px;

    margin-top: 20px;
}

.report-card{

    padding: 35px;

    border-radius: 22px;

    color: white;

    cursor: pointer;

    transition: 0.3s;

    box-shadow:
        0 10px 25px rgba(0,0,0,0.08);
}

.report-card:hover{

    transform:
        translateY(-7px)
        scale(1.02);
}

.report-card h1{

    font-size: 55px;

    margin-bottom: 15px;
}

.report-card p{

    font-size: 18px;
}

/* COLORS */

.blue{
    background:
    linear-gradient(135deg,#4facfe,#00f2fe);
}

.green{
    background:
    linear-gradient(135deg,#43e97b,#38f9d7);
}

.orange{
    background:
    linear-gradient(135deg,#fa709a,#fee140);
}

.red{
    background:
    linear-gradient(135deg,#ff758c,#ff7eb3);
}

.purple{
    background:
    linear-gradient(135deg,#667eea,#764ba2);
}

.dark{
    background:
    linear-gradient(135deg,#434343,#000);
}

/* =========================
   POPUP
========================= */

.popup-overlay{

    position: fixed;

    inset: 0;

    background:
        rgba(0,0,0,0.5);

    display: none;

    justify-content: center;

    align-items: center;

    z-index: 9999;
}

.popup-overlay.active{

    display: flex;
}

.popup-box{

    width: 95%;

    max-width: 1400px;

    background: #fff;

    border-radius: 25px;

    overflow: visible !important;

    max-height: none !important;

    height: auto !important;
}

@keyframes popupShow{

    from{

        transform: scale(0.8);

        opacity: 0;
    }

    to{

        transform: scale(1);

        opacity: 1;
    }
}

.popup-header{

    display: flex;

    justify-content: space-between;

    align-items: center;

    padding: 25px;

    border-bottom:
        1px solid #eee;
}

.popup-header h2{

    font-size: 30px;

    color: #2c3e50;
}

.close-btn{

    background: #ff4d4d;

    border: none;

    color: white;

    width: 45px;

    height: 45px;

    border-radius: 50%;

    font-size: 18px;

    cursor: pointer;
}

.popup-body{

    padding: 30px;

    max-height: 70vh;

    overflow-y: auto;
}

.popup-footer{

    padding: 20px;

    border-top:
        1px solid #eee;

    text-align: right;
}

.download-btn{

    background:
        linear-gradient(
            135deg,
            #4facfe,
            #00f2fe
        );

    border: none;

    color: white;

    padding: 14px 25px;

    border-radius: 12px;

    cursor: pointer;

    font-size: 15px;
}

.popup-content{

    padding: 25px;

    overflow: visible !important;

    max-height: none !important;

    height: auto !important;
}

.analytics-grid{

    display: grid;

    grid-template-columns:
        1fr 1fr;

    gap: 25px;
}

.analytics-card{

    background: #f8faff;

    padding: 25px;

    border-radius: 20px;
}

.analytics-card h3{

    margin-bottom: 20px;

    color: #2c3e50;
}

/* =========================
   LOADER
========================= */

.page-loader{

    position: fixed;

    inset: 0;

    background: white;

    display: flex;

    justify-content: center;

    align-items: center;

    z-index: 99999;

    transition: 0.4s;
}

.page-loader.hide{

    opacity: 0;

    visibility: hidden;
}

.loader{

    width: 70px;

    height: 70px;

    border: 7px solid #eee;

    border-top:
        7px solid #4facfe;

    border-radius: 50%;

    animation:
        spin 1s linear infinite;
}

@keyframes spin{

    to{

        transform: rotate(360deg);
    }
}

.chart-box{

    width: 100%;

    height: auto !important;

    min-height: 450px;

    overflow: visible !important;
}

canvas{

    max-width:100% !important;

    max-height:400px !important;

    width:auto !important;

    height:auto !important;

    margin:auto;

    display:block;
}
</style>

<!-- =========================
     JS
========================= -->

<!-- HTML2PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="./js/reports.js"></script>

</body>
</html>
