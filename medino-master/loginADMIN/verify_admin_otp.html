<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Verify OTP</title><style>

body{

    margin:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Poppins,sans-serif;

    background:
    linear-gradient(
        135deg,
        #00c6ff,
        #0072ff
    );
}

.otp-box{

    width:380px;

    background:#fff;

    padding:40px;

    border-radius:24px;

    text-align:center;

    position:relative;

    box-shadow:
        0 20px 50px rgba(0,0,0,.2);
}

.icon{

    width:80px;
    height:80px;

    margin:auto;
    margin-bottom:20px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #1e3a8a,
        #0ea5e9
    );

    color:#fff;

    font-size:34px;
}

input{

    width:90%;

    padding:15px;

    border-radius:14px;

    border:1px solid #cbd5e1;

    outline:none;

    text-align:center;

    font-size:28px;

    letter-spacing:10px;
}

button{

    width:100%;

    margin-top:20px;

    border:none;

    padding:15px;

    border-radius:14px;

    background:
    linear-gradient(
        135deg,
        #1e3a8a,
        #0ea5e9
    );

    color:#fff;

    font-size:16px;

    cursor:pointer;
}

.resend-btn{

    background:#fff !important;

    color:#2563eb !important;

    border:2px solid #2563eb !important;
}

.otp-close{

    position:absolute;

    top:18px;
    right:18px;

    width:40px;
    height:40px;

    border:none;

    border-radius:50%;

    background:#fee2e2;

    color:#dc2626;

    cursor:pointer;
}

#otpMsg{

    margin-top:18px;

    font-weight:600;
}

</style></head><body><div class="otp-box"><button
    class="otp-close"
    onclick="closeOtpPopup()"
>
    ✕
</button>

<div class="icon">
    🔐
</div>

<h1>Verify OTP</h1>

<p>
    Enter OTP sent to your email
</p>

<input
    type="text"
    id="otpInput"
    maxlength="6"
    placeholder="------"
    oninput="autoVerifyOTP()"
>

<button
    id="verifyBtn"
    onclick="verifyOTP()"
>
    Verify OTP
</button>

<button
    class="resend-btn"
    onclick="resendOTP()"
>
    Resend OTP
</button>

<p id="otpMsg"></p>

</div><script>

function autoVerifyOTP(){

    const input =
        document.getElementById(
            "otpInput"
        );

    input.value =
        input.value.replace(/\D/g,'');

    if(input.value.length === 6){

        verifyOTP();
    }
}

function verifyOTP(){

    const otp =
        document.getElementById(
            "otpInput"
        ).value.trim();

    const admin_id =
        sessionStorage.getItem(
            "otp_admin_id"
        );

    const msg =
        document.getElementById(
            "otpMsg"
        );

    fetch(
        "php/verify_admin_otp.php",
        {

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body: JSON.stringify({

                admin_id,
                otp
            })
        }
    )

    .then(res=>res.json())

    .then(data=>{

        if(data.status === "success"){

            sessionStorage.setItem(
                "admin_logged_in",
                "true"
            );

            sessionStorage.setItem(
                "admin_data",
                JSON.stringify(data.user)
            );

            sessionStorage.removeItem(
                "otp_admin_id"
            );

            msg.style.color =
                "#16a34a";

            msg.innerText =
                "Login successful";

            setTimeout(()=>{

                window.location.replace(
                    "dashboard.html"
                );

            },500);

        }else{

            msg.style.color =
                "red";

            msg.innerText =
                data.message;
        }
    });
}

function resendOTP(){

    const admin_id =
        sessionStorage.getItem(
            "otp_admin_id"
        );

    fetch(
        "resend_admin_otp.php",
        {

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body: JSON.stringify({

                admin_id
            })
        }
    )

    .then(res=>res.json())

    .then(data=>{

        const msg =
            document.getElementById(
                "otpMsg"
            );

        if(data.status === "success"){

            msg.style.color =
                "#16a34a";

            msg.innerText =
                "OTP resent successfully";

        }else{

            msg.style.color =
                "red";

            msg.innerText =
                data.message;
        }
    });
}

function closeOtpPopup(){

    sessionStorage.removeItem(
        "otp_admin_id"
    );

    window.location.replace(
        "login.html"
    );
}

</script></body>
</html>
